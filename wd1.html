<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline Properties</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body { background:#f5f7fa; }
  .sidebar { background:#fff; padding:20px; border-radius:10px; }
  .card img { height:200px; object-fit:cover; }
</style>
</head>

<body>

<div class="container-fluid mt-4">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-3">
      <div class="sidebar shadow-sm">
        <h5>Filter Properties</h5>

        <div class="mb-3">
          <label>Price Range</label>
          <select id="priceFilter" class="form-select">
            <option value="all">All</option>
            <option value="low">Below ₹50L</option>
            <option value="mid">₹50L - ₹1Cr</option>
            <option value="high">Above ₹1Cr</option>
          </select>
        </div>

        <div class="mb-3">
          <label>BHK</label>
          <select id="bhkFilter" class="form-select">
            <option value="all">All</option>
            <option value="1">1 BHK</option>
            <option value="2">2 BHK</option>
            <option value="3">3 BHK</option>
          </select>
        </div>

        <button class="btn btn-primary w-100" onclick="filterProperties()">Apply Filters</button>
      </div>
    </div>

    <!-- Listings -->
    <div class="col-md-9">
      <h3 class="mb-4">Skyline Properties</h3>
      <div class="row g-4" id="propertyList"></div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="propertyModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 id="modalTitle"></h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <img id="modalImage" class="img-fluid mb-3">
        <p><strong>Price:</strong> <span id="modalPrice"></span></p>
        <p><strong>BHK:</strong> <span id="modalBHK"></span></p>
        <p><strong>Description:</strong> <span id="modalDesc"></span></p>
      </div>
    </div>
  </div>
</div>

<script>
const properties = [
  {
    title: "1 BHK Flat",
    price: 2500000,
    bhk: 1,
    img: "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2",
    desc: "Affordable flat perfect for small families."
  },
  {
    title: "2 BHK Apartment",
    price: 6500000,
    bhk: 2,
    img: "https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6",
    desc: "Modern apartment with gym, parking & security."
  },
  {
    title: "3 BHK Villa",
    price: 12000000,
    bhk: 3,
    img: "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c",
    desc: "Luxury villa with garden and private terrace."
  },
  {
    title: "2 BHK Premium Flat",
    price: 8000000,
    bhk: 2,
    img: "https://images.unsplash.com/photo-1572120360610-d971b9d7767c",
    desc: "Premium flat in a prime location."
  },
  {
    title: "3 BHK Penthouse",
    price: 15000000,
    bhk: 3,
    img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c",
    desc: "Spacious penthouse with city view."
  }
];

function displayProperties(list) {
  const container = document.getElementById("propertyList");
  container.innerHTML = "";

  list.forEach((p, index) => {
    container.innerHTML += `
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <img src="${p.img}" class="card-img-top">
          <div class="card-body">
            <h5>${p.title}</h5>
            <p>₹${(p.price/100000).toFixed(1)} Lakhs</p>
            <button class="btn btn-primary" onclick="openModal(${index})">
              View Details
            </button>
          </div>
        </div>
      </div>
    `;
  });
}

function filterProperties() {
  const price = document.getElementById("priceFilter").value;
  const bhk = document.getElementById("bhkFilter").value;

  let filtered = properties.filter(p => {
    let priceMatch =
      price === "all" ||
      (price === "low" && p.price < 5000000) ||
      (price === "mid" && p.price >= 5000000 && p.price <= 10000000) ||
      (price === "high" && p.price > 10000000);

    let bhkMatch =
      bhk === "all" || p.bhk == bhk;

    return priceMatch && bhkMatch;
  });

  displayProperties(filtered);
}

function openModal(index) {
  const p = properties[index];

  document.getElementById("modalTitle").innerText = p.title;
  document.getElementById("modalImage").src = p.img;
  document.getElementById("modalPrice").innerText = "₹" + (p.price/100000).toFixed(1) + " Lakhs";
  document.getElementById("modalBHK").innerText = p.bhk + " BHK";
  document.getElementById("modalDesc").innerText = p.desc;

  new bootstrap.Modal(document.getElementById('propertyModal')).show();
}

// Load initially
displayProperties(properties);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
